<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Multi-domain aware framework for RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/auth.css">
    <style>
        .welcome-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .welcome-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 200, 255, 0.1);
            border-radius: 16px;
            padding: 64px 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(139, 92, 246, 0.2));
            border: 2px solid rgba(96, 165, 250, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome-icon svg {
            width: 48px;
            height: 48px;
            color: #60a5fa;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }
        .welcome-title {
            font-size: 36px;
            font-weight: 700;
            color: #e2e8f0;
            margin: 0 0 16px;
            line-height: 1.2;
        }
        .welcome-subtitle {
            font-size: 15px;
            color: #94a3b8;
            margin: 0 0 48px;
            line-height: 1.6;
        }
        .welcome-buttons {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        .btn-welcome {
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-welcome-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }
        .btn-welcome-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }
        .btn-welcome-secondary {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.3);
        }
        .btn-welcome-secondary:hover {
            background: rgba(96, 165, 250, 0.15);
            border-color: rgba(96, 165, 250, 0.5);
        }
        .welcome-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(100, 100, 150, 0.1);
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="auth-bg">
        <div class="auth-orb orb-1"></div>
        <div class="auth-orb orb-2"></div>
        <div class="auth-grid"></div>
    </div>

    <div class="welcome-wrapper">
        <div class="welcome-card">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
                    <path d="M18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z"/>
                </svg>
            </div>

            <h1 class="welcome-title">Multi-domain aware framework for RAG</h1>
            <p class="welcome-subtitle">Intelligent document retrieval and AI-powered question answering across specialized domains. Sign in or create an account to get started.</p>

            <div class="welcome-buttons">
                <button class="btn-welcome btn-welcome-primary" onclick="goToAuth('login')">Sign In</button>
                <button class="btn-welcome btn-welcome-secondary" onclick="goToAuth('signup')">Create Account</button>
            </div>

            <div class="welcome-footer">
                <p> Multi-domain aware framework for RAG &copy; 2026</p>
            </div>
        </div>
    </div>

    <script>
        function goToAuth(mode) {
            sessionStorage.setItem('authMode', mode);
            window.location.href = '/static/login.html';
        }
    </script>

</body>
</html>
